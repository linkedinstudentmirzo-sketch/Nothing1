<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="Style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <form class="form">
    <h3 class="form__title"> Welcome Back</h3>
    <p class="form__subtitle">Sign in your account to continue</p>
    <label class="form__label" for="Email">Emial</label>
    <br>
    <div class="form__input">
     <i class="fa-solid fa-envelope"></i>
     <input 
     class="form__input--input"
     type="text" 
     placeholder="you@example.com"
     >
    </div>


    <label class="form__label" for="password">Password</label>
    <br>
    <div class="form__input">
     <i class="fa-solid fa-lock"></i>
     <input 
     class="form__input--input"
     type="password" 
     placeholder="*********"
     >
    </div>

    <div class="form__remember">
       <div>
         <input type="checkbox"> 
    <label  for="remember me">Remember me</label>
       </div>
    <a href="***">Forgot Password</a>
    </div>



    <button class="Sign">Sign Up</button>
    <hr>
   <button class="Github">
    <i class="fa-brands fa-github"></i>
    Github
   </button>   

    <p style="color: blue;" class=Text>No account? <a href="**">Create one free </a></p>

    </form>
</body>
</html>
